<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrochemistry Challenge</title>
    <style>
        :root {
            --primary: #0056b3;
            --secondary: #6c757d;
            --success: #28a745;
            --bg: #f0f2f5;
            --accent: #d63384;
            --error: #dc3545;
            --hint-bg: #fff9db;
            --hint-border: #fab005;
            --timer-bg: #e9ecef;
            --multiplier-color: #fd7e14;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 15px;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh;
        }

        .main-wrapper {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 1000px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        h2#mainHeader { margin-top: 0; color: #222; line-height: 1.4; }
        
        .preview-container {
            width: 100%;
            background: #e2e8f0;
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            max-height: 450px;
        }

        .preview-img {
            max-width: 100%;
            max-height: 450px;
            height: auto;
            object-fit: contain;
            display: block;
        }

        .timer-container {
            width: 100%;
            height: 10px;
            background: var(--timer-bg);
            border-radius: 5px;
            margin-bottom: 15px;
            overflow: hidden;
            display: none;
        }
        .timer-bar {
            height: 100%;
            width: 100%;
            background: var(--accent);
            transition: width 0.1s linear;
        }

        .stats-bar {
            display: none;
            justify-content: space-between;
            align-items: center;
            background: #e9ecef;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .multiplier-badge {
            background: var(--multiplier-color);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: none;
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .floating-score {
            position: absolute;
            color: var(--success);
            font-weight: bold;
            font-size: 1.2rem;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        .top-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .btn-speed { 
            background: var(--accent); 
            color: white; 
            animation: pulse 2s infinite;
            display: none; 
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(214, 51, 132, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(214, 51, 132, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(214, 51, 132, 0); }
        }

        .game-layout { display: none; flex-direction: column; gap: 30px; text-align: left; }
        @media (min-width: 768px) {
            .game-layout { flex-direction: row; }
            .left-panel, .right-panel { flex: 1; }
        }

        .cell-img { width: 100%; max-width: 380px; border-radius: 10px; border: 1px solid #ddd; background: #fafafa; min-height: 150px; }

        .step {
            margin-bottom: 12px; padding: 12px; border-radius: 12px;
            display: none; background: #fafafa; border: 1px solid #eee;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        button.choice {
            background: white; border: 2px solid var(--primary); color: var(--primary);
            padding: 10px; border-radius: 8px; cursor: pointer; text-align: left;
            transition: all 0.2s; font-size: 0.95rem;
        }
        button.choice:hover { background: #f0f7ff; }
        button.choice.confirmed {
            background: var(--success); color: white; border-color: var(--success);
            pointer-events: none;
        }

        .feedback { margin-top: 10px; padding: 8px; border-radius: 6px; font-weight: 500; display: none; font-size: 0.85rem; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        .hint-display {
            margin-top: 10px; padding: 10px; border-radius: 8px;
            background: var(--hint-bg); border: 1px solid var(--hint-border);
            color: #856404; font-size: 0.85rem; display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .hint-btn {
            background: none;
            border: 1px dashed var(--secondary);
            color: var(--secondary);
            font-size: 0.8rem;
            margin-top: 10px;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        .hint-btn:hover { background: #eee; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: center;
            justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 15px; max-width: 500px;
            width: 90%; text-align: center;
        }
        .modal-content h3 { color: var(--error); margin-top: 0; }
        .modal-hint { background: var(--hint-bg); border: 1px solid var(--hint-border); padding: 15px; border-radius: 8px; text-align: left; margin: 15px 0; font-size: 0.95rem; color: #856404; }

        button { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-lookup { background: var(--secondary); color: white; }
        .btn-back { background: #e2e8f0; color: #475569; margin-top: 10px; }

        .referee-panel { background: #f8fafc; border: 2px solid var(--secondary); border-radius: 15px; padding: 20px; }
        .referee-label { font-weight: bold; color: var(--secondary); text-transform: uppercase; font-size: 0.75rem; margin-bottom: 5px; display: block; }
        .referee-val { font-size: 1.1rem; color: #1e293b; margin-bottom: 15px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="main-wrapper" id="mainWrapper">
    <h2 id="mainHeader">Electrochemistry Challenge</h2>
    
    <div id="startScreen">
        <div class="preview-container">
            <img id="startPreview" class="preview-img" src="https://lh3.googleusercontent.com/u/0/d/1yLie3QUv4BPaF-9EvBpooHq0FqI6tUrq" alt="Lab Setup" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <p style="color: #64748b; font-weight: bold; display:none;">[ Lab Setup Preview ]</p>
        </div>
        <p id="unlockMsg">Complete the 5-Question Challenge to unlock the 1-Minute Speed Run mode!</p>
    </div>

    <div class="timer-container" id="timerContainer"><div class="timer-bar" id="timerBar"></div></div>

    <div class="stats-bar" id="statsBar">
        <span id="progressText">Question 1</span>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="multiplierBadge" class="multiplier-badge">x1</span>
            <span id="scoreText">Score: 0</span>
            <button id="muteToggle" onclick="toggleMute()" style="background:none; border:1px solid #ccc; font-size:0.7rem; padding:4px 8px;">🎵 Audio: ON</button>
        </div>
    </div>

    <div class="top-nav" id="topNav">
        <button class="btn-primary" onclick="startChallenge('normal')">🚀 Start 5-Question Challenge</button>
        <button id="speedRunBtn" class="btn-speed" onclick="startChallenge('speed')">⚡ 1-Minute Speed Run</button>
        <div style="display:flex; gap:8px;">
            <input type="text" id="manualInput" maxlength="3" placeholder="CODE" style="width:60px; text-align:center; border-radius:8px; border:1px solid #ddd;">
            <button class="btn-lookup" onclick="handleLookup()">Referee</button>
        </div>
    </div>

    <div id="gameUI" class="game-layout">
        <div class="left-panel">
            <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">
                <img id="imgTop" class="cell-img" alt="Top">
                <img id="imgMid" class="cell-img" alt="Mid">
                <img id="imgBot" class="cell-img" alt="Bot">
            </div>
        </div>

        <div class="right-panel">
            <div id="quizView">
                <div id="step1" class="step" style="display:block;">
                    <p class="q-text"><strong>1. Identify Cell Type:</strong></p>
                    <div class="btn-grid" id="typeOptions">
                        <button class="choice" onclick="check(1, 'Galvanic', event)">Galvanic (Simple Cell)</button>
                        <button class="choice" onclick="check(1, 'Electrolytic', event)">Electrolytic (Battery)</button>
                    </div>
                    <button id="btnHint1" class="hint-btn" onclick="showHint(1)">💡 Show Hint</button>
                    <div id="hintText1" class="hint-display"></div>
                    <div id="feed1" class="feedback"></div>
                </div>
                <div id="step2" class="step">
                    <p class="q-text"><strong>2. Cathode Reaction:</strong></p>
                    <div class="btn-grid" id="cathodeOptions"></div>
                    <button id="btnHint2" class="hint-btn" onclick="showHint(2)">💡 Show Hint</button>
                    <div id="hintText2" class="hint-display"></div>
                    <div id="feed2" class="feedback"></div>
                </div>
                <div id="step3" class="step">
                    <p class="q-text"><strong>3. Anode Reaction:</strong></p>
                    <div class="btn-grid" id="anodeOptions"></div>
                    <button id="btnHint3" class="hint-btn" onclick="showHint(3)">💡 Show Hint</button>
                    <div id="hintText3" class="hint-display"></div>
                    <div id="feed3" class="feedback"></div>
                </div>
            </div>

            <div id="refereeView" style="display:none;" class="referee-panel">
                <span class="referee-label">Cell Type</span>
                <div id="refType" class="referee-val"></div>
                
                <span class="referee-label">Cathode Reaction</span>
                <div id="refCathode" class="referee-val"></div>
                
                <span class="referee-label">Anode Reaction</span>
                <div id="refAnode" class="referee-val" style="border:none;"></div>

                <div style="margin-top:30px; padding-top:20px; border-top:1px solid #ddd; display:flex; flex-direction:column; gap:10px;">
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="refInput" maxlength="3" placeholder="CODE" style="flex:1; padding:12px; border-radius:8px; border:1px solid #ddd; text-align:center;">
                        <button class="btn-lookup" onclick="const c = document.getElementById('refInput').value; if(c) handleLookup(c)">Verify</button>
                    </div>
                    <button class="btn-back" onclick="resetToMenu()">Back to Home</button>
                </div>
            </div>

            <div id="finalScreen" style="display:none;">
                <h2 id="finalTitle">Challenge Complete!</h2>
                <p id="finalScoreDisplay" style="font-size:1.5rem; font-weight:bold; color:var(--primary);"></p>
                <div id="finalStats" style="margin-bottom: 20px; color: #666;"></div>
                <button class="btn-primary" style="width:100%" onclick="resetToMenu()">Return to Main Menu</button>
            </div>
        </div>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modalTitle">Incorrect</h3>
        <p id="modalMsg"></p>
        <div class="modal-hint" id="modalHint"></div>
        <button id="modalBtn" class="btn-primary" onclick="closeModal()">Next Question</button>
    </div>
</div>

<audio id="audioNormal" loop><source src="Looping Light.mp3" type="audio/mpeg"></audio>
<audio id="audioSpeed" loop><source src="Quiz Rush.mp3" type="audio/mpeg"></audio>

    const cards = { top: {'X':'11wEFvXwfLzBZ1SgOGQlsHyB5wU45g33U','Y':'1styWSAwquPiUu1qumygk2sd6rhHxk9Vp','Z':'1Fm0QekVp8wiijZmBI4WhyWj94oadYuXW'}, mid: {'1':'1h8k3HrKtKo2W4EOA_w4FkwLGaGfa3UE-','2':'152FmHKjXnaNwHyCtd6SNHRn5LjkQsKTY','3':'1BZS6WaUIqZQEOi88hOkttVpPmTOtzqRZ','4':'1dSYunw9jRpDNUt80zrCFnZsDwsw-36KE','5':'14vDs71B7g8xY4aYg8eFE01EbheLXHMEQ','6':'1GMj1ys-LwEmj_fwrzFtHU8sm6BFfTjmI','7':'1aT4NwcPrIoRzEpZ4jftC8rDXMUYDkuJi','8':'10Hb_RvzM10iILU8t-uors7XKdrpB9w_a'}, bot: {'A':'1pBjeNzI0o3YJH6ExcR_FItQa-U8Mst0r','B':'1OFc8M43SI8nnxe-ChyPYvNvc1XDYISO7','C':'1XqK1MsctReFIPuiQlJj4EtDGeScXEMuY','D':'1nQywDWt2gqVPCtJv4HgNp_--v2YiatgF','E':'1jM8GW3uZFhuNyeW6gfzZcvC6Rn-mLqIg','F':'1pCskQ9Kw8FnPbtNwDY0gmD53RNmR_8Df','G':'1rSolvIXevfppVDExA7oPYeuTqHNjTY9J','H':'1zyMKRT_AEYARRa1NToDzOV5_Sq77-Xh4'}};

    const cPool = Array.from(new Set(Object.values(masterData).map(v => v[0]))).filter(x => x !== "No reaction");
    const aPool = Array.from(new Set(Object.values(masterData).map(v => v[1]))).filter(x => x !== "No reaction");

    const hints = [
        "Galvanic cells produce electricity. Electrolytic cells require a battery.",
        "Cathode: Reduction occurs. In aqueous solutions, least reactive cations discharge.",
        "Anode: Oxidation occurs. If electrode is reactive metal, it oxidises first."
    ];

    let current = { code: "", cathode: "", anode: "", type: "", hintUsed: false };
    let gameState = { 
        mode: 'normal', 
        score: 0, 
        timer: 60, 
        interval: null, 
        usedCodes: new Set(), 
        isMuted: false,
        streak: 0,
        multiplier: 1
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playDing() {
        if(gameState.isMuted) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function playZap() {
        if(gameState.isMuted) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(220, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(55, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    function playFanfare() {
        if(gameState.isMuted) return;
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (i * 0.1));
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime + (i * 0.1));
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (i * 0.1) + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + (i * 0.1));
            osc.stop(audioCtx.currentTime + (i * 0.1) + 0.4);
        });
    }

    window.onload = () => {
        if (localStorage.getItem('electro_unlocked') === 'true') {
            document.getElementById('speedRunBtn').style.display = 'block';
            document.getElementById('unlockMsg').innerText = "Speed Run is Unlocked! Prove your mastery!";
        }
    };

    function toggleMute() { 
        gameState.isMuted = !gameState.isMuted;
        document.getElementById('audioNormal').muted = gameState.isMuted;
        document.getElementById('audioSpeed').muted = gameState.isMuted;
        document.getElementById('muteToggle').innerText = gameState.isMuted ? '🔇 Audio: OFF' : '🎵 Audio: ON';
    }

    function resetToMenu() {
        location.reload();
    }

    function startChallenge(mode) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const normalTrack = document.getElementById('audioNormal');
        const speedTrack = document.getElementById('audioSpeed');
        
        normalTrack.pause(); speedTrack.pause();
        if (mode === 'speed') speedTrack.play().catch(()=>{});
        else normalTrack.play().catch(()=>{});

        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('topNav').style.display = 'none';
        document.getElementById('statsBar').style.display = 'flex';
        document.getElementById('gameUI').style.display = 'flex';
        document.getElementById('quizView').style.display = 'block';
        document.getElementById('refereeView').style.display = 'none';
        
        gameState.mode = mode;
        gameState.score = 0;
        gameState.questionCount = 1;
        gameState.usedCodes.clear();
        gameState.streak = 0;
        gameState.multiplier = 1;

        if (mode === 'speed') {
            document.getElementById('timerContainer').style.display = 'block';
            document.getElementById('multiplierBadge').style.display = 'inline-block';
            startTimer();
        } else {
            document.getElementById('multiplierBadge').style.display = 'none';
        }
        nextQuestion();
    }

    function startTimer() {
        gameState.timer = 60;
        const bar = document.getElementById('timerBar');
        gameState.interval = setInterval(() => {
            gameState.timer -= 0.1;
            bar.style.width = (gameState.timer / 60 * 100) + '%';
            if (gameState.timer <= 0) endGame();
        }, 100);
    }

    function nextQuestion() {
        current.hintUsed = false;
        document.getElementById('progressText').innerText = gameState.mode === 'speed' ? `Solving Questions...` : `Question ${gameState.questionCount}`;
        updateScoreUI();
        
        const allKeys = Object.keys(masterData).filter(k => masterData[k][0] !== "No reaction" && !gameState.usedCodes.has(k));
        if (allKeys.length === 0) return endGame();
        
        const code = allKeys[Math.floor(Math.random() * allKeys.length)];
        gameState.usedCodes.add(code);
        
        loadSpecificCode(code);
    }

    function loadSpecificCode(code) {
        current.code = code;
        current.type = (code[0] === 'X') ? 'Galvanic' : 'Electrolytic';
        current.cathode = masterData[code][0];
        current.anode = masterData[code][1];

        const base = "https://lh3.googleusercontent.com/u/0/d/";
        document.getElementById('imgTop').src = base + cards.top[code[0]];
        document.getElementById('imgMid').src = base + cards.mid[code[1]];
        document.getElementById('imgBot').src = base + cards.bot[code[2]];

        if (gameState.mode === 'referee') {
            displayRefereeResults();
        } else {
            setupQuizButtons();
        }
    }

    function displayRefereeResults() {
        document.getElementById('quizView').style.display = 'none';
        document.getElementById('refereeView').style.display = 'block';
        document.getElementById('refType').innerText = current.type;
        document.getElementById('refCathode').innerText = current.cathode;
        document.getElementById('refAnode').innerText = current.anode;
        document.getElementById('refInput').value = "";
        playDing();
    }

    function setupQuizButtons() {
        // Step 1: Identification
        const typeGrid = document.getElementById('typeOptions');
        typeGrid.innerHTML = `
            <button class="choice" onclick="check(1, 'Galvanic', event)">Galvanic (Simple Cell)</button>
            <button class="choice" onclick="check(1, 'Electrolytic', event)">Electrolytic (Battery)</button>
        `;

        // Step 2: Cathode
        const cOpts = shuffle([current.cathode, ...shuffle(cPool.filter(x => x !== current.cathode)).slice(0, 3)]);
        const cathodeGrid = document.getElementById('cathodeOptions');
        cathodeGrid.innerHTML = cOpts.map(o => `<button class="choice" onclick="check(2, '${o}', event)">${o}</button>`).join('');
        
        // Step 3: Anode
        const aOpts = shuffle([current.anode, ...shuffle(aPool.filter(x => x !== current.anode)).slice(0, 3)]);
        const anodeGrid = document.getElementById('anodeOptions');
        anodeGrid.innerHTML = aOpts.map(o => `<button class="choice" onclick="check(3, '${o}', event)">${o}</button>`).join('');

        for(let i=1; i<=3; i++) {
            document.getElementById('step'+i).style.display = (i===1) ? 'block' : 'none';
            document.getElementById('feed'+i).style.display = 'none';
            document.getElementById('hintText'+i).style.display = 'none';
            document.getElementById('btnHint'+i).style.display = 'inline-block';
        }
    }

    function showHint(step) {
        current.hintUsed = true;
        if(gameState.mode === 'speed') {
            gameState.multiplier = 1;
            gameState.streak = 0;
            updateScoreUI();
        }
        const hintDisplay = document.getElementById('hintText' + step);
        const hintBtn = document.getElementById('btnHint' + step);
        hintDisplay.innerText = hints[step - 1];
        hintDisplay.style.display = 'block';
        hintBtn.style.display = 'none';
    }

    function check(step, val, event) {
        const isCorrect = (step === 1) ? (val === current.type) : (step === 2) ? (val === current.cathode) : (val === current.anode);
        
        if (isCorrect) {
            playDing();
            
            // Clean up UI for the current step
            const gridId = (step === 1) ? 'typeOptions' : (step === 2) ? 'cathodeOptions' : 'anodeOptions';
            const grid = document.getElementById(gridId);
            const displayVal = (step === 1) ? (val === 'Galvanic' ? 'Galvanic (Simple Cell)' : 'Electrolytic (Battery)') : val;
            
            // Lock UI: Remove all distractors, replace with a single "confirmed" button
            grid.innerHTML = `<button class="choice confirmed">${displayVal}</button>`;
            
            // Hide hint button and hint text to save space
            document.getElementById('btnHint'+step).style.display = 'none';
            document.getElementById('hintText'+step).style.display = 'none';

            if(gameState.mode === 'speed') {
                const earned = 100 * gameState.multiplier;
                gameState.score += earned;
                gameState.streak++;
                gameState.multiplier = 1 + Math.floor(gameState.streak / 3);
                showFloatingScore(event.clientX, event.clientY, `+${earned}`);
                updateScoreUI();
            }

            if (step < 3) {
                const nextStep = document.getElementById('step'+(step+1));
                nextStep.style.display = 'block';
                // Small scroll to ensure next step is visible if layout is tight
                nextStep.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                if (gameState.mode === 'normal' && !current.hintUsed) gameState.score++;
                if (gameState.mode === 'normal' && gameState.questionCount >= 5) {
                    localStorage.setItem('electro_unlocked', 'true');
                    endGame();
                } else {
                    if (gameState.mode !== 'speed') gameState.questionCount++;
                    setTimeout(nextQuestion, 600);
                }
            }
        } else {
            playZap();
            if(gameState.mode === 'speed') {
                gameState.streak = 0;
                gameState.multiplier = 1;
                updateScoreUI();
            }
            showWrongModal(step);
        }
    }

    function updateScoreUI() {
        document.getElementById('scoreText').innerText = `Score: ${gameState.score}`;
        const badge = document.getElementById('multiplierBadge');
        badge.innerText = `x${gameState.multiplier}`;
        badge.style.display = (gameState.multiplier > 1) ? 'inline-block' : 'none';
    }

    function showFloatingScore(x, y, text) {
        const div = document.createElement('div');
        div.className = 'floating-score';
        div.innerText = text;
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    function showWrongModal(step) {
        const modal = document.getElementById('modalOverlay');
        const msg = document.getElementById('modalMsg');
        const hint = document.getElementById('modalHint');
        let correctVal = (step === 1) ? current.type : (step === 2) ? current.cathode : current.anode;
        if (step === 1) correctVal = (correctVal === 'Galvanic' ? 'Galvanic (Simple Cell)' : 'Electrolytic (Battery)');
        
        msg.innerHTML = `The correct answer was:<br><strong>${correctVal}</strong>`;
        hint.innerHTML = `<strong>Concept Tip:</strong><br>${hints[step-1]}`;
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        if (gameState.mode === 'normal' && gameState.questionCount >= 5) {
            localStorage.setItem('electro_unlocked', 'true');
            endGame();
        } else {
            if (gameState.mode !== 'speed') gameState.questionCount++;
            nextQuestion();
        }
    }

    function endGame() {
        clearInterval(gameState.interval);
        document.getElementById('audioNormal').pause();
        document.getElementById('audioSpeed').pause();
        playFanfare();
        document.getElementById('quizView').style.display = 'none';
        document.getElementById('timerContainer').style.display = 'none';
        document.getElementById('finalScreen').style.display = 'block';
        document.getElementById('finalScoreDisplay').innerText = `Final Score: ${gameState.score}`;
        document.getElementById('finalTitle').innerText = (gameState.mode === 'speed') ? "Time's Up!" : "Challenge Complete!";
        
        if(gameState.mode === 'speed') {
            document.getElementById('finalStats').innerHTML = `You solved many steps with a max multiplier of <strong>x${gameState.multiplier}</strong>!`;
        } else {
            document.getElementById('finalStats').innerHTML = `You scored <strong>${gameState.score}/5</strong> on the challenge.`;
        }
    }

    function shuffle(a) { return a.sort(() => Math.random() - 0.5); }
    
    function handleLookup(passedCode = null) {
        const code = (passedCode || document.getElementById('manualInput').value).toUpperCase();
        if(!masterData[code] || masterData[code][0] === "No reaction") return;

        if (audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('audioNormal').play().catch(()=>{});
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('topNav').style.display = 'none';
        document.getElementById('statsBar').style.display = 'flex';
        document.getElementById('gameUI').style.display = 'flex';
        
        gameState.mode = 'referee';
        document.getElementById('progressText').innerText = `Referee: ${code}`;
        document.getElementById('scoreText').innerText = "Verified Solution";
        loadSpecificCode(code);
    }
</script>
